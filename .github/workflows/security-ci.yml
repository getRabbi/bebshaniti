name: Security CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-scan:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - shell: pwsh
        run: ./infra/scripts/check-no-secrets.ps1
      - run: npm audit --audit-level=high
