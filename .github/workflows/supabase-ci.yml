name: Supabase Migration CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  supabase-migrate-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start -x studio,imgproxy,edge-runtime,logflare,vector
      - run: supabase db reset
      - run: supabase db lint --local --level warning
