name: Supabase Migration CI

on:
  pull_request:
    paths: ["supabase/**", ".github/workflows/supabase-ci.yml"]
  push:
    branches: [main]
    paths: ["supabase/**", ".github/workflows/supabase-ci.yml"]

permissions:
  contents: read

jobs:
  supabase-migrate-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start -x studio,imgproxy,edge-runtime,logflare,vector
      - run: supabase db reset
      - run: supabase db lint --local --level warning
