name: Flutter CI

on:
  pull_request:
    paths: ["apps/pos_flutter/**", ".github/workflows/flutter-ci.yml"]
  push:
    branches: [main]
    paths: ["apps/pos_flutter/**", ".github/workflows/flutter-ci.yml"]

permissions:
  contents: read

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pos_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format lib test
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-formatted-source
          path: |
            apps/pos_flutter/lib
            apps/pos_flutter/test
      - run: git diff --exit-code -- lib test
      - run: flutter analyze
      - run: flutter test
