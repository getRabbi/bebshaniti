name: Landing CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  landing-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_APP_URL: https://app.example.com
      NEXT_PUBLIC_CONTACT_EMAIL: hello@example.com
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace @bd-business-os/landing
      - run: npm run typecheck --workspace @bd-business-os/landing
      - run: npm run build --workspace @bd-business-os/landing
