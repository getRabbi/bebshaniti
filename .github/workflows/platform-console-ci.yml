name: Platform Console CI

on:
  pull_request:
    paths: ["apps/platform_console/**", "package*.json", ".github/workflows/platform-console-ci.yml"]
  push:
    branches: [main]
    paths: ["apps/platform_console/**", "package*.json", ".github/workflows/platform-console-ci.yml"]

permissions:
  contents: read

jobs:
  platform-console-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://project-ref.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      PLATFORM_ADMIN_EMAILS: owner@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace @bd-business-os/platform-console
      - run: npm run typecheck --workspace @bd-business-os/platform-console
      - run: npm run build --workspace @bd-business-os/platform-console
